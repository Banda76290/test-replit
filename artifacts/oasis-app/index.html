<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>OASIS Projet</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Provide Monaco Editor with a no-op local worker so it never tries to
         fetch workers from the CDN (which fails in Replit's sandboxed env and
         causes non-Error rejections that crash the preview iframe). -->
    <script>
      self.MonacoEnvironment = {
        getWorker: function() {
          var blob = new Blob([''], { type: 'application/javascript' });
          return new Worker(URL.createObjectURL(blob));
        }
      };
      window.addEventListener('unhandledrejection', function(e) {
        if (e.reason == null || !(e.reason instanceof Error)) {
          e.preventDefault();
          e.stopImmediatePropagation();
        }
      }, true);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
