<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>OASIS Projet</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
      /* ── Monaco CDN worker fix ──────────────────────────────────────────────
         Monaco (loaded from CDN via @monaco-editor/react) spawns web workers
         with CDN URLs. In Replit's sandbox those workers fail to load, which
         emits a non-Error unhandledrejection that Replit's CDP monitor treats
         as a fatal crash and shows the artifact error screen.

         Fix: intercept new Worker() before ANY script runs.
           • CDN / external URLs → replaced with a silent no-op blob worker
           • blob: URLs (our own inline workers) → passed through unchanged
         This prevents the failing fetch entirely, so no rejection is ever raised.
         MonacoEnvironment.getWorker is also set as a belt-and-suspenders guard.
      ──────────────────────────────────────────────────────────────────────── */
      (function () {
        var _Worker = window.Worker;

        function isCdnUrl(u) {
          if (!u) return false;
          var s = (u instanceof URL ? u.href : String(u));
          return s.indexOf('blob:') !== 0;
        }

        function noopWorker(options) {
          var blob = new Blob(['self.onmessage=function(){}'], { type: 'application/javascript' });
          return new _Worker(URL.createObjectURL(blob), options);
        }

        window.Worker = function (url, options) {
          if (isCdnUrl(url)) return noopWorker(options);
          return new _Worker(url, options);
        };
        window.Worker.prototype = _Worker.prototype;

        self.MonacoEnvironment = {
          getWorker: function () { return noopWorker(); }
        };
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
